  { region: "busan", q: "다음 설명에 해당하는 지역은?", context: "우리나라 최대의 항구 도시로, 무역과 물류의 중심지이며 조선업과 수산업이 발달했다.", options: ["서울", "강원도", "부산", "광주", "제주도"], answer: 2 },
  { region: "jeju", q: "다음 설명에 해당하는 지역은?", context: "화산 활동으로 만들어진 섬으로, 현무암 지형과 한라산이 있으며 감귤 재배가 활발하다.", options: ["강원도", "부산", "광주", "제주도", "서울"], answer: 3 },

];

let current = 0;
let score = 0;
let answered = false;

function renderQuestion() {
  const container = document.getElementById('quiz-container');
  const q = questions[current];
  document.getElementById('progress-out').textContent = `${current} / 5`;
  answered = false;

  container.innerHTML = `
    <p class="qlabel">문제 ${current + 1}</p>
    <p class="qtext">${q.q}</p>
    <p class="qctx">${q.context}</p>
    <div id="options"></div>
    <div id="feedback"></div>
    <button id="next-btn" style="display:none;">${current === questions.length - 1 ? '결과 보기' : '다음 문제'}</button>
  `;

  const optionsEl = document.getElementById('options');
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i, btn);
    optionsEl.appendChild(btn);
  });

  document.getElementById('next-btn').onclick = () => {
    current++;
    if (current < questions.length) {
      renderQuestion();
    } else {
      showFinal();
    }
  };
}

function selectAnswer(i, btn) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const optionsEl = document.getElementById('options');
  const buttons = optionsEl.querySelectorAll('button');
  const feedback = document.getElementById('feedback');

  buttons.forEach((b, idx) => {
    b.disabled = true;
    if (idx === q.answer) {
      b.style.borderColor = '#2e7d32';
      b.style.background = '#e8f5e9';
      b.style.color = '#1b5e20';
    } else if (idx === i) {
      b.style.borderColor = '#c62828';
      b.style.background = '#ffebee';
      b.style.color = '#8e0000';
    }
  });

  if (i === q.answer) {
    score++;
    feedback.innerHTML = `<span style="color:#2e7d32; font-weight:600;">정답입니다.</span> ${regionData[q.region].desc}`;
  } else {
    feedback.innerHTML = `<span style="color:#c62828; font-weight:600;">오답입니다.</span> 정답은 '${q.options[q.answer]}'. ${regionData[q.region].desc}`;
  }

  document.getElementById('next-btn').style.display = 'inline-block';
}

function showFinal() {
  document.getElementById('progress-out').textContent = `5 / 5`;
  document.getElementById('quiz-container').style.display = 'none';
  document.getElementById('final-result').style.display = 'block';
  document.getElementById('final-score').textContent = `${score} / 5`;
}

document.getElementById('retry-btn').onclick = () => {
  current = 0;
  score = 0;
  document.getElementById('quiz-container').style.display = 'block';
  document.getElementById('final-result').style.display = 'none';
  renderQuestion();
};

Object.keys(regionData).forEach(key => {
  const el = document.getElementById('region-' + key);
  if (el) {
    el.addEventListener('click', () => {
      const info = regionData[key];
      document.getElementById('region-info').innerHTML =
        `<strong style="color:#1a1a1a;">${info.name}</strong><br>${info.desc}`;
    });
  }
});

renderQuestion();
</script>
